<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Шахівниця</title>
    <style>
      table {
        border-collapse: collapse;
        margin: 20px auto;
        border: 2px solid #333;
      }
      td {
        width: 50px;
        height: 50px;
        text-align: center;
      }
      th {
        background: #eee;
        font-family: sans-serif;
        font-weight: bold;
      }

      /* Логіка розфарбовування шахівниці */
      /* Парні клітинки в непарних рядках — темні */
      tr:nth-child(odd) td:nth-child(even) {
        background: #999;
      }
      /* Непарні клітинки в парних рядках — темні */
      tr:nth-child(even) td:nth-child(odd) {
        background: #999;
      }
      /* Решта клітинок — світлі */
      tr:nth-child(odd) td:nth-child(odd) {
        background: #fff;
      }
      tr:nth-child(even) td:nth-child(even) {
        background: #fff;
      }

      .notation-v {
        width: 30px;
      }
      .notation-h {
        height: 30px;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        Шахівниця (Алгебраїчна нотація)
      </caption>
      <tr>
